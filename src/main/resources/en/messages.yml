messages:
  prefix: "&#FF00FF[⚔]"
  no-permission: "&cYou don't have permission"
  not-in-clan:
    - "%prefix% &6/clan create - &fcreate a clan"
    - "&6/clan top - &fview the clan leaderboard"
  in-clan:
    - "%prefix% &6/clan menu - &fopen the clan menu"
    - "&6/clan invite <player> - &finvite a player to the clan"
    - "&6/clan kick <player> - &fkick a player from the clan"
    - "&f/clan invest <amount> - &fdeposit funds into the clan balance"
    - "&6/clan withdraw <amount> - &fwithdraw funds from the clan balance"
    - "&6/clan leave - &fleave the clan"
    - "&6/clan chat <message> - &fsend a message to the clan chat"
    - "&6/clan pvp - &ftoggle the PVP mode"
    - "&6/clan disband - &fdisband the clan"
    - "&6/clan rank <player> <2 - deputy, 3 - member> - &fassign a rank to a player"
    - "&6/clan top - &fview the clan leaderboard"
    - "&6/clan info <clan> - &fview clan information"
    - "&6/clan stats <player> - &fview player information"
    - "&6/clan storage - &fopen the clan storage"
    - "&6/clan glow - &ftoggle glow effect"
    - "&6/clan base - &fteleport to the clan base"
    - "&6/clan setbase - &fset the clan base"
    - "&6/clan delbase - &fdelete the clan base"
  clan-level-up: "&fThe clan level has been increased"
  not-player: "&fYou are not a player!"
  unknown-command: "&cCommand not found"
  error: "&cNo command handler found"
  clan-name-limit: "&fClan name must be between &c%min% &fand &a%max% &fcharacters long"
  clan-name-bad-word: "&cClan name is on the list of prohibited words"
  no-clan: "&cNo clans available"
  place-format: "&6%place%. &e%clan_name%: &6%xp% &fXP"
  use-blocked-command: "&6%command% &fcannot be used during an event"

  command:
    no-permission: "&cYou need a higher rank"
    not-in-clan: "&cYou are not in a clan"
